<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Foodland AI Poradca</title>
<style>
  :root {
    --green: #1f7a3f;
    --green-dark: #155c2e;
    --bg: #f4f6f4;
    --bubble-bot: #ffffff;
    --bubble-user: #1f7a3f;
    --muted: #6b7280;
    --warn: #b45309;
    --border: #e2e5e0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--green);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  #status {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    white-space: nowrap;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 720px; display: flex; flex-direction: column; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .bubble {
    border-radius: 14px;
    padding: 10px 14px;
    line-height: 1.45;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--bubble-user); color: white; border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .card {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13.5px;
    max-width: 720px;
  }
  .card h3 { margin: 0 0 6px; font-size: 14px; color: var(--green-dark); }
  .card .meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .note { color: var(--warn); font-size: 12.5px; margin: 4px 0; }
  ul.ing-list { list-style: none; margin: 6px 0 0; padding: 0; }
  ul.ing-list li { padding: 8px 0; border-top: 1px solid var(--border); }
  ul.ing-list li:first-child { border-top: none; }
  .ing-text { font-weight: 500; }
  .suggestion { margin-top: 3px; font-size: 12.5px; color: #374151; }
  .suggestion a { color: var(--green-dark); text-decoration: none; font-weight: 600; }
  .suggestion a:hover { text-decoration: underline; }
  .tag { display: inline-block; font-size: 10.5px; padding: 1px 7px; border-radius: 8px; background: #eef2ee; color: var(--green-dark); margin-left: 4px; }
  .tag.medium { background: #fef3e2; color: var(--warn); }
  .tag.miss { background: #fdeaea; color: #b42318; }
  .results-group { margin-top: 10px; }
  .results-group h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 10px 0 4px; }
  .result-item { padding: 6px 0; border-top: 1px solid var(--border); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .result-item:first-child { border-top: none; }
  .result-item a { color: var(--green-dark); text-decoration: none; font-weight: 500; }
  .result-item a:hover { text-decoration: underline; }
  .price { color: var(--muted); font-size: 12px; }
  .thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #f0f0f0; }
  .suggestion-row { display: flex; align-items: center; gap: 8px; }
  .shopping-list, .related-box { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .shopping-list h4, .related-box h4 { font-size: 12.5px; margin: 0 0 6px; color: var(--green-dark); }
  ul.shop-items { list-style: none; margin: 0; padding: 0; }
  ul.shop-items li { padding: 4px 0; font-size: 13px; }
  .related-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .followup-note { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-style: italic; }
  footer {
    flex-shrink: 0;
    padding: 12px 16px;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  #lang {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 8px;
    font-size: 13px;
    background: white;
  }
  #q {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
  }
  #q:focus { outline: none; border-color: var(--green); }
  #send {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #send:hover { background: var(--green-dark); }
  #send:disabled { opacity: 0.5; cursor: default; }
  .hint { color: var(--muted); font-size: 12px; align-self: center; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Foodland AI Poradca</h1>
    <div class="sub">Predajný poradca nad reálnymi dátami z Foodland.sk</div>
  </div>
  <div id="status">načítavam...</div>
</header>

<div id="chat"></div>

<footer>
  <select id="lang" title="Jazyk URL pre výsledky">
    <option value="SK" selected>SK</option>
    <option value="CZ">CZ</option>
    <option value="AT">AT</option>
    <option value="EN">EN</option>
    <option value="PL">PL</option>
    <option value="HU">HU</option>
    <option value="VI">VI</option>
  </select>
  <input id="q" type="text" placeholder="Napíš otázku, napr. Čo potrebujem na uvarenie Kimchi?" autocomplete="off">
  <button id="send">Odoslať</button>
</footer>

<script>
const chatEl = document.getElementById('chat');
const qEl = document.getElementById('q');
const langEl = document.getElementById('lang');
const sendEl = document.getElementById('send');
const statusEl = document.getElementById('status');
const SESSION_ID = (window.crypto && crypto.randomUUID)
  ? crypto.randomUUID()
  : ('s_' + Date.now() + '_' + Math.random().toString(36).slice(2));

function esc(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addBubble(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  wrap.appendChild(b);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return wrap;
}

function addCardWrap() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  chatEl.appendChild(wrap);
  return wrap;
}

function suggestionHtml(s) {
  if (!s) return '';
  if (s.type === 'inline_link') {
    return `<div class="suggestion">🔗 <a href="${esc(s.link)}" target="_blank">Priamy odkaz na nákup tejto ingrediencie</a></div>`;
  }
  if (s.type === 'curated_shop_link') {
    return `<div class="suggestion">🛒 Odporúčaná kategória &mdash; <a href="${esc(s.link)}" target="_blank">${esc(s.ingredient)}</a></div>`;
  }
  if (s.type === 'product_match') {
    const p = s.product;
    const tagClass = s.confidence === 'high' ? '' : 'medium';
    const img = p.image_link ? `<img class="thumb" src="${esc(p.image_link)}" alt="">` : '';
    let html = `<div class="suggestion"><div class="suggestion-row">${img}<span>${esc(s.confidence_label)}: <a href="${esc(p.link)}" target="_blank">${esc(p.title)}</a> &mdash; ${esc(p.price)}<span class="tag ${tagClass}">${esc(s.confidence)} zhoda</span></span></div></div>`;
    return html;
  }
  if (s.type === 'generic_staple') {
    return `<div class="note">⚪ ${esc(s.message)}</div>`;
  }
  if (s.type === 'no_match') {
    return `<div class="note">⚠️ ${esc(s.message)}</div>`;
  }
  return '';
}

function renderShoppingList(summary) {
  if (!summary || !summary.items || !summary.items.length) return '';
  let html = '<div class="shopping-list"><h4>🛒 Súhrnný nákupný zoznam</h4><ul class="shop-items">';
  for (const it of summary.items) {
    const label = it.link ? `<a href="${esc(it.link)}" target="_blank">${esc(it.text)}</a>` : esc(it.text);
    const note = it.note ? ` <span class="tag medium">${esc(it.note)}</span>` : '';
    html += `<li>${label}${note}</li>`;
  }
  html += '</ul>';
  const c = summary.counts || {};
  const parts = [];
  if (c.ready) parts.push(`${c.ready} pripravených na nákup`);
  if (c.check) parts.push(`${c.check} si over`);
  if (c.not_on_foodland) parts.push(`${c.not_on_foodland} bežných surovin mimo ponuky`);
  if (c.no_match) parts.push(`${c.no_match} bez zhody`);
  if (parts.length) html += `<div class="meta">${esc(parts.join(' · '))}</div>`;
  html += '</div>';
  return html;
}

function renderRelatedSuggestions(list) {
  if (!list || !list.length) return '';
  let html = '<div class="related-box"><h4>✨ Možno sa ti zíde aj</h4>';
  for (const s of list) {
    const img = s.image_link ? `<img class="thumb" src="${esc(s.image_link)}" alt="">` : '';
    const reason = s.reason ? ` &mdash; ${esc(s.reason)}` : '';
    html += `<div class="related-item">${img}<span><a href="${esc(s.link)}" target="_blank">${esc(s.title)}</a>${reason}</span></div>`;
  }
  html += '</div>';
  return html;
}

function renderRecipeAnswer(r) {
  const card = document.createElement('div');
  card.className = 'card';
  let html = '';
  if (r.is_followup && r.followup_note) {
    html += `<div class="followup-note">↩ ${esc(r.followup_note)}</div>`;
  }
  html += `<h3>🍳 ${esc(r.recipe_name)}</h3>`;
  if (r.cuisine) html += `<div class="meta">${esc(r.cuisine)}</div>`;

  if (!r.ingredients_available) {
    html += `<div class="note">${esc(r.message)}</div>`;
    if (r.recipe_link) html += `<div class="suggestion"><a href="${esc(r.recipe_link)}" target="_blank">Otvoriť recept na Foodland.sk</a></div>`;
    card.innerHTML = html;
    return card;
  }

  if (r.source_lang_note) {
    html += `<div class="note">ℹ️ ${esc(r.source_lang_note)}</div>`;
  }

  html += '<ul class="ing-list">';
  for (const ing of r.ingredients) {
    html += `<li><div class="ing-text">${esc(ing.text)}</div>${suggestionHtml(ing.suggestion)}</li>`;
  }
  html += '</ul>';
  if (r.recipe_link) {
    html += `<div class="suggestion" style="margin-top:8px;"><a href="${esc(r.recipe_link)}" target="_blank">Otvoriť celý recept na Foodland.sk</a></div>`;
  }
  html += renderShoppingList(r.shopping_list);
  html += renderRelatedSuggestions(r.related_suggestions);
  card.innerHTML = html;
  return card;
}

const SOURCE_LABELS = {
  product: 'Produkty', faq: 'FAQ', recipe: 'Recepty', blog: 'Magazín',
  cross_sell: 'Cross-sell tipy', alternative: 'Alternatívy',
  products_ai: 'Odporúčané produkty', intent_mapping: 'Súvisiace odkazy'
};

function resultLabel(r) {
  return r.title || r.question || r.name || r.product_title || r.intent || '(bez názvu)';
}
function resultLink(r, lang) {
  if (r.link) return r.link;
  if (r.product_link) return r.product_link;
  if (r.urls) return r.urls[lang] || Object.values(r.urls).find(u => u) || '';
  return '';
}
function resultPrice(r) {
  return r.price ? r.price : '';
}
function resultImage(r) {
  return r.image_link || '';
}

function renderResultsCard(results, lang) {
  if (!results || results.length === 0) return null;
  const grouped = {};
  for (const r of results) {
    (grouped[r.source] = grouped[r.source] || []).push(r);
  }
  const card = document.createElement('div');
  card.className = 'card';
  let html = '<h3>🔎 Súvisiace nálezy v dátach Foodland</h3>';
  for (const source of Object.keys(grouped)) {
    html += `<div class="results-group"><h4>${esc(SOURCE_LABELS[source] || source)}</h4>`;
    for (const r of grouped[source].slice(0, 5)) {
      const link = resultLink(r, lang);
      const price = resultPrice(r);
      const img = resultImage(r);
      html += `<div class="result-item">`;
      if (img) html += `<img class="thumb" src="${esc(img)}" alt="">`;
      html += link ? `<a href="${esc(link)}" target="_blank">${esc(resultLabel(r))}</a>` : esc(resultLabel(r));
      if (price) html += ` <span class="price">${esc(price)}</span>`;
      html += `</div>`;
    }
    html += '</div>';
  }
  card.innerHTML = html;
  return card;
}

async function loadHealth() {
  try {
    const res = await fetch('/health');
    const data = await res.json();
    statusEl.textContent = `${data.mode} · ${data.products_loaded} produktov`;
  } catch (e) {
    statusEl.textContent = 'backend nedostupný';
  }
}

async function send() {
  const question = qEl.value.trim();
  if (!question) return;
  const lang = langEl.value;
  addBubble('user', question);
  qEl.value = '';
  sendEl.disabled = true;

  const thinking = addBubble('bot', 'Hľadám v reálnych dátach Foodland...');

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, lang, session_id: SESSION_ID})
    });

    if (res.status === 429) {
      thinking.querySelector('.bubble').textContent = 'Prekročil(a) si limit otázok (30 / 10 min na IP). Skús to o chvíľu znova.';
      sendEl.disabled = false;
      return;
    }

    const data = await res.json();
    thinking.remove();

    if (data.error) {
      addBubble('bot', 'Chyba: ' + data.error);
      sendEl.disabled = false;
      return;
    }

    if (data.mode === 'llm' && data.answer) {
      addBubble('bot', data.answer);
    } else if (data.llm_error) {
      addBubble('bot', '(LLM režim momentálne nedostupný, zobrazujem priame výsledky z dát.)');
    }

    const wrap = addCardWrap();
    let any = false;
    if (data.recipe_answers && data.recipe_answers.length) {
      for (const r of data.recipe_answers) {
        wrap.appendChild(renderRecipeAnswer(r));
        any = true;
      }
    }
    const resultsCard = renderResultsCard(data.results, lang);
    if (resultsCard) {
      wrap.appendChild(resultsCard);
      any = true;
    }
    if (!any) {
      addBubble('bot', 'Pre túto otázku som v dátach Foodland nenašiel žiadnu zhodu.');
    }
    chatEl.scrollTop = chatEl.scrollHeight;
  } catch (e) {
    thinking.querySelector('.bubble').textContent = 'Backend nie je dostupný. Skontroluj, či beží `python3 app/main.py`.';
  }
  sendEl.disabled = false;
}

sendEl.addEventListener('click', send);
qEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

loadHealth();
addBubble('bot', 'Ahoj! Spýtaj sa ma na produkty, recepty, ingrediencie alebo čokoľvek o Foodland.sk -- odpovedám len na základe reálnych dát z e-shopu.');
</script>

</body>
</html>
